<!DOCTYPE html>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .phrase-tag { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .phrase-tag:hover { transform: translateY(-2px); }
    .phrase-tag.selected { background-color: #db2777; color: white; border-color: #db2777; }
    .module-btn { transition: all 0.2s; }
    .module-btn.active { background-color: #db2777; color: white; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
  <div class="max-w-7xl mx-auto px-4 py-6">
    <!-- 头部 -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-5xl font-bold tracking-tighter text-pink-500">JAV Prompt Builder</h1>
        <p class="text-zinc-400 mt-1">flghyy-art 版本 • 14 个模块 • 实时编辑</p>
      </div>
      <div class="flex items-center gap-3">
        <a href="https://github.com/flghyy-art/nsfw-prompt-templates-asian" target="_blank" 
           class="px-4 py-2 bg-zinc-900 rounded-2xl text-sm flex items-center gap-2 hover:bg-zinc-800">

        </a>
      </div>
    </div>

    <!-- 模块导航 -->
    <div id="module-nav" class="flex flex-wrap gap-2 mb-8"></div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- 左侧 -->
      <div class="lg:col-span-7">
        <div id="category-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6"></div>
        <div id="phrase-grid" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
      </div>

      <!-- 右侧 -->
      <div class="lg:col-span-5">
        <div class="bg-zinc-900 rounded-3xl p-8 sticky top-6">
          <div class="flex justify-between items-center mb-4">
            <h2 class="font-semibold text-xl">已组装 Prompt</h2>
            <span id="selected-count" class="px-3 py-1 bg-pink-600 text-white text-xs rounded-full font-mono">0</span>
          </div>
          
          <textarea id="prompt-output" readonly 
                    class="w-full h-[380px] bg-zinc-950 text-sm p-6 rounded-2xl font-mono resize-y border border-zinc-800"></textarea>

          <div class="grid grid-cols-3 gap-3 mt-6">
            <button onclick="copyPrompt()" class="flex items-center justify-center gap-2 bg-pink-600 hover:bg-pink-700 py-4 rounded-2xl font-medium transition">
              <i class="fas fa-copy"></i> <span>复制</span>
            </button>
            <button onclick="clearAll()" class="flex items-center justify-center gap-2 bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl transition">
              <i class="fas fa-trash"></i> <span>清空</span>
            </button>
            <button onclick="toggleEditMode()" id="edit-btn" class="flex items-center justify-center gap-2 bg-amber-600 hover:bg-amber-700 py-4 rounded-2xl transition">
              <i class="fas fa-edit"></i> <span>编辑</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 编辑弹窗（已放大版） -->
  <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[100]">
    <div class="bg-zinc-900 rounded-3xl w-full max-w-2xl mx-4 p-10">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-3xl font-bold">编辑提示词</h3>
        <button onclick="closeModal()" class="text-zinc-400 hover:text-white text-2xl">×</button>
      </div>
      
      <textarea id="edit-input" class="w-full h-48 bg-zinc-800 border border-zinc-700 p-6 rounded-2xl text-lg font-mono resize-y"></textarea>
      
      <div class="flex gap-4 mt-8">
        <button onclick="saveEdit()" class="flex-1 bg-pink-600 hover:bg-pink-700 py-4 rounded-2xl font-medium text-lg">保存修改</button>
        <button onclick="deleteCurrentPhrase()" class="flex-1 bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-medium text-lg">删除这条</button>
        <button onclick="closeModal()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-4 rounded-2xl font-medium text-lg">取消</button>
      </div>
    </div>
  </div>

  <script>
    const promptData = { /* 保持之前完整14模块数据不变 */ 
      "00-范例": { "校园": ["classroom back row, sailor uniform unbuttoned, one breast exposed", "library desk under, skirt hiked, panties aside", "sports storage room, gym uniform lifted"], "家居": ["bedroom morning light, white shirt open, bare breasts", "kitchen island, apron only, sideboob"], "职场": ["after hours office, boss desk, blouse unbuttoned", "meeting room at night, skirt lifted"], "温泉": ["steamy onsen, outdoor bath, towel slipping", "bubble bath, wet skin glistening"] },
      "01-场景主题": { "室内私密": ["love hotel pink room, ceiling mirror, rotating bed", "messy bedroom, unmade sheets, morning after"], "洗浴温泉": ["steamy onsen, rotenburo, outdoor hot spring", "bubble bath, wet bathroom floor"], "学校": ["empty classroom after school, teacher desk", "school rooftop at sunset, chain link fence"], "职场": ["after hours office, boss desk", "meeting room at night, glass wall"], "交通": ["crowded train, last train at night", "taxi backseat at night, street lights"] },
      "02-景别构图": { "景别": ["medium shot, waist-up", "close-up, face filling frame", "full body shot", "extreme close-up on pussy"], "视角": ["POV, first person view", "low angle looking up", "over the shoulder", "voyeur angle through door crack"], "设备": ["iPhone selfie", "DSLR photo, shallow depth of field", "CCTV surveillance footage", "35mm film camera"], "构图": ["rule of thirds", "golden spiral", "tight crop on body", "frame within frame doorway"] },
      "03-裸露液体": { "6级裸露": ["L3 half naked, bra pushed up", "L4 only panties remaining", "L5 fully nude", "L6 legs spread wide, pussy displayed"], "衣物状态": ["blouse unbuttoned", "skirt lifted to waist", "towel slipping off shoulder", "wet clothes clinging to body", "torn stockings"], "液体": ["single drop of cum on lip", "sweat glistening on skin", "wet pussy glistening", "thin streak of semen"] },
      "04-服装专项": { "制服": ["sailor uniform, pleated miniskirt", "JK school uniform, loose tie", "nurse uniform, low-cut"], "和风": ["yukata slipping off shoulder", "kimono falling open, loose obi"], "情趣内衣": ["lace lingerie set", "crotchless panties", "garter belt and stockings only"], "状态变化": ["blouse unbuttoned showing breasts", "skirt hiked up, panties aside"] },
      "05-光影氛围": { "专业布光": ["rim light, golden hair glow", "Rembrandt dramatic side light", "butterfly lighting, glamorous", "soft box, even skin glow"], "情色专用": ["backlit nude silhouette", "sweat glistening under warm light", "neon pink blue split lighting", "candlelit intimate glow"], "色温": ["warm candlelight, golden skin", "golden hour window light", "cool moonlight blue", "neon love hotel glow"] },
      "06-姿势动作": { "静态姿势": ["sitting on desk, legs spread", "kneeling on bed, looking up", "lying on back, legs open wide", "standing bent over"], "口交颜射": ["POV deep throat blowjob", "cum on face, eyes looking up", "tongue out, semen dripping from chin"], "多人动态": ["doggy style from behind", "missionary, legs over shoulders", "cowgirl riding"] },
      "07-表情眼神": { "表情": ["shy expression, blushing cheeks", "seductive smile, biting lip", "ecstasy, eyes rolled back", "teary ahegao face"], "眼神": ["looking up through long lashes", "avoiding eye contact, embarrassed", "direct eye contact, lustful"] },
      "08-风格胶片": { "胶片模拟": ["Kodak Portra 400, warm skin tones", "Fuji Pro 400H, dreamy pastel", "Kodak Tri-X, high contrast B&W", "Ektar 100, vibrant colors"], "电影镜头": ["cinematic film still, ARRI Alexa", "Cooke lens, soft bokeh", "anamorphic lens flare"] },
      "09-妆容专项": { "妆容": ["natural makeup, smudged red lipstick", "glossy lips, heavy eyeliner", "sweat ruined makeup, running mascara", "cute pink blush, glossy eyes"] },
      "10-发型饰品": { "发型": ["long black hair, messy after sex", "ponytail, hair pulled back", "wet hair clinging to face"], "饰品": ["cat ears headband", "black choker necklace", "pearl earrings", "glasses slipping down nose"] },
      "11-瑕疵细节": { "真实细节": ["beauty mark on cheek", "freckles across nose", "chipped nail polish", "small scar on inner thigh", "sweat droplets on collarbone"] },
      "12-纹身标记": { "纹身": ["small heart tattoo above left breast", "tramp stamp cherry blossom", "tribal lower back tattoo with skin fusion"] },
      "13-道具宠物": { "道具": ["vibrator pressed on clit", "handcuffs on wrists", "wine glass spilled on sheets", "candle wax dripping on skin"], "宠物": ["cat watching from the bed", "dog collar and leash"] },
      "14-人格卡片": { "身份职业": ["office lady, shy subordinate", "married woman next door", "innocent high school student", "gentle but lewd nurse", "secret slut idol singer"] }
    };

    let currentModule = "", currentCategory = "", selectedPhrases = [], editMode = false, editingInfo = null;

    function renderModuleNav() {
      const container = document.getElementById('module-nav');
      container.innerHTML = Object.keys(promptData).map(mod => `
        <button onclick="loadModule('${mod}')" class="module-btn px-5 py-2.5 text-sm rounded-2xl bg-zinc-900 hover:bg-zinc-800 ${currentModule === mod ? 'active' : ''}">${mod}</button>
      `).join('');
    }

    function loadModule(mod) {
      currentModule = mod; renderModuleNav();
      const cats = Object.keys(promptData[mod]);
      document.getElementById('category-grid').innerHTML = cats.map(cat => `
        <div onclick="loadPhrases('${mod}', '${cat}')" class="bg-zinc-900 hover:bg-zinc-800 p-5 rounded-2xl cursor-pointer text-center border border-zinc-800 hover:border-pink-500"><div class="font-medium">${cat}</div></div>
      `).join('');
      document.getElementById('phrase-grid').innerHTML = '';
    }

    function loadPhrases(mod, cat) {
      currentCategory = cat;
      const phrases = promptData[mod][cat];
      document.getElementById('phrase-grid').innerHTML = phrases.map((phrase, index) => `
        <div onclick="${editMode ? `editPhrase('${phrase}', ${index})` : `togglePhrase('${phrase}')`}" class="phrase-tag bg-zinc-800 hover:bg-zinc-700 px-4 py-3 rounded-2xl text-sm cursor-pointer border border-zinc-700 break-words ${selectedPhrases.includes(phrase) ? 'selected' : ''}">${phrase}</div>
      `).join('');
    }

    function togglePhrase(phrase) {
      if (selectedPhrases.includes(phrase)) selectedPhrases = selectedPhrases.filter(p => p !== phrase);
      else selectedPhrases.push(phrase);
      updateOutput();
      if (currentModule && currentCategory) loadPhrases(currentModule, currentCategory);
    }

    function updateOutput() {
      document.getElementById('prompt-output').value = selectedPhrases.join(', ');
      document.getElementById('selected-count').textContent = selectedPhrases.length;
    }

    function copyPrompt() {
      const text = document.getElementById('prompt-output').value;
      if (!text) return alert('还没有选择任何提示词！');
      navigator.clipboard.writeText(text).then(() => alert('✅ 已复制到剪贴板！'));
    }

    function clearAll() {
      if (confirm('确定清空所有已选提示词吗？')) {
        selectedPhrases = []; updateOutput();
        if (currentModule && currentCategory) loadPhrases(currentModule, currentCategory);
      }
    }

    function toggleEditMode() {
      editMode = !editMode;
      const btn = document.getElementById('edit-btn');
      btn.innerHTML = editMode ? '<i class="fas fa-check"></i> <span>完成</span>' : '<i class="fas fa-edit"></i> <span>编辑</span>';
      btn.classList.toggle('bg-emerald-600', editMode);
      btn.classList.toggle('bg-amber-600', !editMode);
      if (currentModule && currentCategory) loadPhrases(currentModule, currentCategory);
    }

    function editPhrase(phrase, index) {
      editingInfo = { module: currentModule, category: currentCategory, oldPhrase: phrase, index: index };
      document.getElementById('edit-input').value = phrase;
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('edit-input').focus();
    }

    function saveEdit() {
      const newText = document.getElementById('edit-input').value.trim();
      if (!newText || !editingInfo) return;
      const { module, category, oldPhrase, index } = editingInfo;
      promptData[module][category][index] = newText;
      if (selectedPhrases.includes(oldPhrase)) selectedPhrases = selectedPhrases.map(p => p === oldPhrase ? newText : p);
      closeModal(); loadPhrases(module, category); updateOutput();
    }

    function deleteCurrentPhrase() {
      if (!editingInfo || !confirm('确定删除这条提示词吗？')) return;
      const { module, category, oldPhrase, index } = editingInfo;
      promptData[module][category].splice(index, 1);
      selectedPhrases = selectedPhrases.filter(p => p !== oldPhrase);
      closeModal(); loadPhrases(module, category); updateOutput();
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      editingInfo = null;
    }

    function init() {
      renderModuleNav();
      loadModule("01-场景主题");
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
      });
    }
    window.onload = init;
  </script>
</body>
</html>
