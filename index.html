<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NSFW Prompt Templates Asian</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
<script src="nprom_data.js"></script>
  <script type="text/babel">
    // 内嵌数据，不依赖外部文件
    const DEFAULT_DATA = window.DEFAULT_DATA;

    const KEY = "pb_v3";
    const load = () => { try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : DEFAULT_DATA; } catch { return DEFAULT_DATA; } };
    const persist = (d) => { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch {} };

    const Back   = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>;
    const Copy   = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>;
    const Trash  = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>;
    const Edit2  = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
    const Plus   = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    const X      = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const Check  = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>;
    const ChevR  = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>;
    const Search = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
    const Reset  = () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.49"/></svg>;
    const Bubble = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;

    function Sheet({ onDismiss, children, maxH = "80vh" }) {
      return (
        <div
          style={{ position:"fixed", inset:0, zIndex:2000, background:"rgba(6,0,5,.72)", backdropFilter:"blur(8px)", WebkitBackdropFilter:"blur(8px)", display:"flex", alignItems:"flex-end" }}
          onClick={e => e.target === e.currentTarget && onDismiss()}
        >
          <div style={{ width:"100%", background:"#150010", borderRadius:"24px 24px 0 0", border:"1px solid rgba(219,39,119,.28)", borderBottom:"none", maxHeight:maxH, display:"flex", flexDirection:"column", boxShadow:"0 -20px 60px rgba(219,39,119,.2)", paddingBottom:"env(safe-area-inset-bottom)" }}>
            <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 4px", flexShrink:0 }}>
              <div style={{ width:44, height:4, borderRadius:4, background:"rgba(219,39,119,.3)" }}/>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function EditModal({ target, onSave, onDelete, onClose }) {
      const [v, setV] = React.useState(target.phrase);
      const ref = React.useRef();
      React.useEffect(() => { setTimeout(() => ref.current?.focus(), 100); }, []);

      return (
        <Sheet onDismiss={onClose}>
          <div style={{ padding:"4px 20px 12px", borderBottom:"1px solid rgba(219,39,119,.12)", flexShrink:0 }}>
            <div style={{ fontSize:11, color:"rgba(219,39,119,.5)", fontFamily:"monospace", marginBottom:3 }}>{target.moduleName} › {target.catName}</div>
            <div style={{ fontSize:19, fontWeight:700, color:"#f9d2e6" }}>编辑短语</div>
          </div>
          <div style={{ padding:"16px 20px", flexShrink:0 }}>
            <textarea ref={ref} value={v} onChange={e=>setV(e.target.value)} rows={3}
              style={{ width:"100%", boxSizing:"border-box", background:"rgba(219,39,119,.07)", border:"1.5px solid rgba(219,39,119,.25)", borderRadius:14, color:"#fce7f3", fontSize:16, lineHeight:1.6, padding:"13px 16px", resize:"none", outline:"none", fontFamily:"'DM Mono',monospace", WebkitAppearance:"none" }}
              onFocus={e=>{ e.target.style.borderColor="rgba(219,39,119,.7)"; }}
              onBlur={e=>{ e.target.style.borderColor="rgba(219,39,119,.25)"; }}
            />
          </div>
          <div style={{ padding:"0 20px 16px", display:"flex", gap:10, flexShrink:0 }}>
            <button onClick={onDelete} style={{ flex:1, height:52, borderRadius:14, border:"1.5px solid rgba(239,68,68,.3)", background:"rgba(239,68,68,.08)", color:"#fca5a5", fontSize:15, fontWeight:600, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}><Trash/> 删除</button>
            <button onClick={onClose}  style={{ flex:1, height:52, borderRadius:14, border:"1.5px solid rgba(255,255,255,.1)", background:"rgba(255,255,255,.04)", color:"rgba(255,255,255,.4)", fontSize:15, cursor:"pointer" }}>取消</button>
            <button onClick={() => v.trim() && onSave(v.trim())} style={{ flex:2, height:52, borderRadius:14, border:"none", background:v.trim()?"linear-gradient(135deg,#db2777,#9d174d)":"rgba(219,39,119,.2)", color:v.trim()?"#fff":"rgba(255,255,255,.3)", fontSize:15, fontWeight:700, cursor:v.trim()?"pointer":"not-allowed", display:"flex", alignItems:"center", justifyContent:"center", gap:8, boxShadow:v.trim()?"0 4px 18px rgba(219,39,119,.35)":"none" }}><Check/> 保存</button>
          </div>
        </Sheet>
      );
    }

    function AddModal({ moduleName, catName, onAdd, onClose }) {
      const [v, setV] = React.useState("");
      const ref = React.useRef();
      React.useEffect(() => { setTimeout(() => ref.current?.focus(), 100); }, []);
      return (
        <Sheet onDismiss={onClose}>
          <div style={{ padding:"4px 20px 12px", borderBottom:"1px solid rgba(219,39,119,.12)", flexShrink:0 }}>
            <div style={{ fontSize:11, color:"rgba(219,39,119,.5)", fontFamily:"monospace", marginBottom:3 }}>{moduleName} › {catName}</div>
            <div style={{ fontSize:19, fontWeight:700, color:"#f9d2e6" }}>添加新短语</div>
          </div>
          <div style={{ padding:"16px 20px", flexShrink:0 }}>
            <textarea ref={ref} value={v} onChange={e=>setV(e.target.value)} rows={3} placeholder="输入新的提示词短语…"
              style={{ width:"100%", boxSizing:"border-box", background:"rgba(219,39,119,.07)", border:"1.5px solid rgba(219,39,119,.25)", borderRadius:14, color:"#fce7f3", fontSize:16, lineHeight:1.6, padding:"13px 16px", resize:"none", outline:"none", fontFamily:"'DM Mono',monospace", WebkitAppearance:"none" }}
              onFocus={e=>{ e.target.style.borderColor="rgba(219,39,119,.7)"; }}
              onBlur={e=>{ e.target.style.borderColor="rgba(219,39,119,.25)"; }}
            />
          </div>
          <div style={{ padding:"0 20px 16px", display:"flex", gap:10, flexShrink:0 }}>
            <button onClick={onClose} style={{ flex:1, height:52, borderRadius:14, border:"1.5px solid rgba(255,255,255,.1)", background:"rgba(255,255,255,.04)", color:"rgba(255,255,255,.4)", fontSize:15, cursor:"pointer" }}>取消</button>
            <button onClick={() => v.trim() && onAdd(v.trim())} style={{ flex:2, height:52, borderRadius:14, border:"none", background:v.trim()?"linear-gradient(135deg,#db2777,#9d174d)":"rgba(219,39,119,.2)", color:v.trim()?"#fff":"rgba(255,255,255,.3)", fontSize:15, fontWeight:700, cursor:v.trim()?"pointer":"not-allowed", display:"flex", alignItems:"center", justifyContent:"center", gap:8, boxShadow:v.trim()?"0 4px 18px rgba(219,39,119,.35)":"none" }}><Plus/> 添加</button>
          </div>
        </Sheet>
      );
    }

    function PromptSheet({ assembled, onRemove, onCopy, onClear, onClose, copied }) {
      return (
        <Sheet onDismiss={onClose} maxH="82vh">
          <div style={{ padding:"4px 20px 14px", borderBottom:"1px solid rgba(219,39,119,.12)", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0 }}>
            <div>
              <div style={{ fontSize:19, fontWeight:800, color:"#f9d2e6" }}>已组装 Prompt</div>
              <div style={{ fontSize:12, color:"rgba(219,39,119,.5)", marginTop:2 }}>{assembled.length} 条短语</div>
            </div>
            <button onClick={onClose} style={{ background:"rgba(255,255,255,.07)", border:"none", borderRadius:10, padding:9, cursor:"pointer", color:"rgba(240,214,232,.5)", display:"flex" }}><X/></button>
          </div>
          {assembled.length > 0 && (
            <div style={{ padding:"12px 16px", borderBottom:"1px solid rgba(219,39,119,.08)", display:"flex", flexWrap:"wrap", gap:8, overflowY:"auto", maxHeight:150, flexShrink:0 }}>
              {assembled.map((p,i) => (
                <span key={i} onClick={() => onRemove(p)} style={{ display:"inline-flex", alignItems:"center", gap:5, padding:"6px 12px", borderRadius:8, background:"rgba(219,39,119,.15)", border:"1px solid rgba(219,39,119,.3)", color:"#fce7f3", fontSize:13, cursor:"pointer", fontFamily:"'DM Mono',monospace" }}>
                  {p} <span style={{ opacity:.4, fontSize:11 }}>×</span>
                </span>
              ))}
            </div>
          )}
          <textarea readOnly value={assembled.join(", ")} placeholder="点击短语加入 Prompt…"
            style={{ flex:1, background:"transparent", border:"none", color:"rgba(252,231,243,.8)", fontSize:13.5, lineHeight:1.85, padding:"14px 18px", resize:"none", outline:"none", fontFamily:"'DM Mono',monospace", WebkitAppearance:"none", minHeight:100 }}
          />
          <div style={{ padding:"12px 16px", display:"flex", gap:10, flexShrink:0 }}>
            <button onClick={onCopy} disabled={!assembled.length} style={{ flex:1, height:54, borderRadius:14, border:"none", background:assembled.length?"linear-gradient(135deg,#db2777,#9d174d)":"rgba(219,39,119,.15)", color:assembled.length?"#fff":"rgba(255,255,255,.3)", fontSize:15, fontWeight:700, cursor:assembled.length?"pointer":"not-allowed", display:"flex", alignItems:"center", justifyContent:"center", gap:9, boxShadow:assembled.length?"0 4px 18px rgba(219,39,119,.35)":"none" }}>
              <Copy/> {copied ? "已复制 ✓" : "复制全部"}
            </button>
            <button onClick={onClear} disabled={!assembled.length} style={{ width:54, height:54, borderRadius:14, border:"1.5px solid rgba(219,39,119,.2)", background:"rgba(219,39,119,.05)", color:assembled.length?"rgba(240,214,232,.6)":"rgba(255,255,255,.15)", cursor:assembled.length?"pointer":"not-allowed", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <Trash/>
            </button>
          </div>
        </Sheet>
      );
    }

    function Toast({ msg, visible }) {
      return (
        <div style={{ position:"fixed", bottom:"calc(88px + env(safe-area-inset-bottom))", left:"50%", transform:`translateX(-50%) translateY(${visible?0:"8px"})`, opacity:visible?1:0, transition:"all .2s ease", background:"rgba(219,39,119,.95)", color:"#fff", padding:"10px 22px", borderRadius:30, fontSize:14, fontWeight:700, zIndex:4000, boxShadow:"0 6px 20px rgba(219,39,119,.4)", pointerEvents:"none", whiteSpace:"nowrap" }}>
          {msg}
        </div>
      );
    }

    function App() {
      const [data,       setData]       = React.useState(() => load());
      const [view,       setView]       = React.useState("modules");
      const [selMod,     setSelMod]     = React.useState(null);
      const [selCat,     setSelCat]     = React.useState(null);
      const [assembled,  setAssembled]  = React.useState([]);
      const [editMode,   setEditMode]   = React.useState(false);
      const [editTarget, setEditTarget] = React.useState(null);
      const [addTarget,  setAddTarget]  = React.useState(null);
      const [showPrompt, setShowPrompt] = React.useState(false);
      const [search,     setSearch]     = React.useState("");
      const [toast,      setToast]      = React.useState({ msg:"", v:false });
      const [copied,     setCopied]     = React.useState(false);
      const catRef  = React.useRef();
      const tRef    = React.useRef();

      React.useEffect(() => { persist(data); }, [data]);

      const flash = (msg) => {
        clearTimeout(tRef.current);
        setToast({ msg, v:true });
        tRef.current = setTimeout(() => setToast(t=>({...t,v:false})), 1700);
      };

      const openMod = (mod) => {
        setSelMod(mod.id);
        setSelCat(mod.categories[0]?.id ?? null);
        setSearch("");
        setView("phrases");
      };
      const goBack = () => { setView("modules"); setSelMod(null); setSelCat(null); setSearch(""); };

      const addPhrase = (p) => { setAssembled(prev => prev.includes(p) ? prev : [...prev, p]); flash("已添加 ✓"); };
      const removePhrase = (p) => setAssembled(prev => prev.filter(x=>x!==p));

      const handleCopy = async () => {
        if (!assembled.length) return;
        try {
          await navigator.clipboard.writeText(assembled.join(", "));
          setCopied(true); flash("已复制到剪贴板 ✓");
          setTimeout(() => setCopied(false), 2000);
        } catch { flash("复制失败，请手动选取"); }
      };

      const saveEdit = (newP) => {
        setData(prev => prev.map(m => m.id!==editTarget.moduleId ? m : { ...m, categories: m.categories.map(c => c.id!==editTarget.catId ? c : { ...c, phrases: c.phrases.map((p,i) => i===editTarget.idx ? newP : p) }) }));
        setAssembled(prev => prev.map(p => p===editTarget.phrase ? newP : p));
        setEditTarget(null); flash("修改已保存");
      };
      const deleteEdit = () => {
        setData(prev => prev.map(m => m.id!==editTarget.moduleId ? m : { ...m, categories: m.categories.map(c => c.id!==editTarget.catId ? c : { ...c, phrases: c.phrases.filter((_,i)=>i!==editTarget.idx) }) }));
        setAssembled(prev => prev.filter(p => p!==editTarget.phrase));
        setEditTarget(null); flash("已删除");
      };
      const addNew = (p) => {
        setData(prev => prev.map(m => m.id!==addTarget.moduleId ? m : { ...m, categories: m.categories.map(c => c.id!==addTarget.catId ? c : { ...c, phrases:[...c.phrases, p] }) }));
        setAddTarget(null); flash("已添加新短语");
      };
      const handleReset = () => { if (confirm("重置所有数据到默认？")) { setData(DEFAULT_DATA); setAssembled([]); flash("已重置"); } };

      const curMod = data.find(m => m.id===selMod);
      const curCat = curMod?.categories.find(c => c.id===selCat);
      const filtered = curCat ? (search ? curCat.phrases.filter(p=>p.toLowerCase().includes(search.toLowerCase())) : curCat.phrases) : [];

      const P = "#db2777";
      const border = "rgba(219,39,119,.14)";
      const muted  = "rgba(240,214,232,.42)";
      const mono   = "'DM Mono','Fira Code',monospace";

      return (
        <>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
            *, *::before, *::after { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
            html, body { margin:0; padding:0; background:#0a0008; overflow:hidden; height:100%; overscroll-behavior:none; }
            #root { height:100%; }
            input, textarea, button { font-family:inherit; }
            ::-webkit-scrollbar { display:none; }
          `}</style>

          <div style={{
            height:"100dvh",
            background:"#0a0008",
            color:"#f0d6e8",
            fontFamily:"'Outfit','Noto Sans SC',sans-serif",
            display:"flex",
            flexDirection:"column",
            maxWidth:430,
            margin:"0 auto",
            overflow:"hidden",
            position:"relative",
          }}>
            <div style={{ height:"env(safe-area-inset-top,44px)", background:"#0a0008", flexShrink:0 }}/>

            <div style={{ display:"flex", alignItems:"center", padding:"8px 16px 10px", gap:12, borderBottom:`1px solid ${border}`, flexShrink:0, background:"rgba(10,0,8,.95)", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)" }}>
              <div style={{ width:40, display:"flex", justifyContent:"flex-start" }}>
                {view==="phrases" && (
                  <button onClick={goBack} style={{ background:"none", border:"none", color:P, cursor:"pointer", padding:"6px 0", display:"flex", alignItems:"center", gap:2 }}>
                    <Back/> <span style={{ fontSize:15, fontWeight:600 }}>返回</span>
                  </button>
                )}
              </div>
              <div style={{ flex:1, textAlign:"center" }}>
                {view==="modules" ? (
                  <span style={{ fontSize:18, fontWeight:800, letterSpacing:"-.03em", background:"linear-gradient(135deg,#f9a8d4,#db2777)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>✦ Prompt Builder</span>
                ) : (
                  <span style={{ fontSize:16, fontWeight:700 }}>{curMod?.icon} {curMod?.label.slice(3)}</span>
                )}
              </div>
              <div style={{ width:62, display:"flex", justifyContent:"flex-end" }}>
                <button onClick={() => setEditMode(e=>!e)} style={{ padding:"6px 10px", borderRadius:20, border:`1.5px solid ${editMode ? P : border}`, background:editMode ? "rgba(219,39,119,.2)" : "transparent", color:editMode ? "#fce7f3" : muted, fontSize:12.5, fontWeight:editMode?700:400, cursor:"pointer", display:"flex", alignItems:"center", gap:4 }}>
                  <Edit2/> {editMode?"完成":"编辑"}
                </button>
              </div>
            </div>

            {view==="modules" && (
              <div style={{ flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch" }}>
                <div style={{ padding:"14px 14px 0", fontSize:11, color:"rgba(219,39,119,.38)", fontWeight:700, letterSpacing:".09em", textTransform:"uppercase" }}>{data.length} 个模块</div>
                <div style={{ padding:"8px 14px 0" }}>
                  {data.map(mod => (
                    <button key={mod.id} onClick={() => openMod(mod)} style={{ width:"100%", textAlign:"left", padding:"14px 16px", marginBottom:8, borderRadius:16, border:`1px solid ${border}`, background:"rgba(219,39,119,.03)", color:"#f0d6e8", cursor:"pointer", display:"flex", alignItems:"center", gap:14 }}
                      onTouchStart={e=>{ e.currentTarget.style.background="rgba(219,39,119,.1)"; }}
                      onTouchEnd={e=>{ e.currentTarget.style.background="rgba(219,39,119,.03)"; }}
                    >
                      <span style={{ fontSize:26, lineHeight:1, width:32, textAlign:"center", flexShrink:0 }}>{mod.icon}</span>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:15, fontWeight:600, marginBottom:2 }}>{mod.label}</div>
                        <div style={{ fontSize:12, color:muted }}>{mod.categories.length} 分类 · {mod.categories.reduce((a,c)=>a+c.phrases.length,0)} 短语</div>
                      </div>
                      <span style={{ color:"rgba(219,39,119,.3)", flexShrink:0 }}><ChevR/></span>
                    </button>
                  ))}
                </div>
                <div style={{ padding:"4px 14px 120px" }}>
                  <button onClick={handleReset} style={{ width:"100%", padding:"13px 16px", borderRadius:14, border:`1px dashed rgba(219,39,119,.2)`, background:"transparent", color:"rgba(219,39,119,.38)", fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                    <Reset/> 重置所有数据
                  </button>
                </div>
              </div>
            )}

            {view==="phrases" && curMod && (
              <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
                <div ref={catRef} style={{ display:"flex", gap:8, overflowX:"auto", padding:"11px 14px", borderBottom:`1px solid ${border}`, flexShrink:0, scrollbarWidth:"none" }}>
                  {curMod.categories.map(cat => (
                    <button key={cat.id} onClick={() => { setSelCat(cat.id); setSearch(""); }} style={{ padding:"8px 16px", borderRadius:20, flexShrink:0, border:`1.5px solid ${selCat===cat.id ? P : border}`, background:selCat===cat.id ? "rgba(219,39,119,.2)" : "transparent", color:selCat===cat.id ? "#fce7f3" : muted, fontSize:14, fontWeight:selCat===cat.id?700:400, cursor:"pointer", whiteSpace:"nowrap" }}>
                      {cat.label}
                      <span style={{ opacity:.45, fontSize:12, marginLeft:5 }}>{cat.phrases.length}</span>
                    </button>
                  ))}
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:10, margin:"10px 14px 2px", padding:"11px 14px", borderRadius:13, background:"rgba(219,39,119,.07)", border:`1px solid ${border}`, flexShrink:0 }}>
                  <span style={{ color:muted, display:"flex", flexShrink:0 }}><Search/></span>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜索短语…"
                    style={{ flex:1, background:"transparent", border:"none", color:"#fce7f3", fontSize:16, outline:"none" }}
                  />
                  {search && (
                    <button onClick={()=>setSearch("")} style={{ background:"none", border:"none", color:muted, cursor:"pointer", display:"flex", padding:2 }}><X/></button>
                  )}
                </div>
                <div style={{ flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch", padding:"10px 14px 120px", display:"flex", flexWrap:"wrap", gap:9, alignContent:"flex-start" }}>
                  {filtered.map((phrase, idx) => {
                    const origIdx = curCat.phrases.indexOf(phrase);
                    const inA = assembled.includes(phrase);
                    return (
                      <div key={`${phrase}-${idx}`} style={{ display:"flex", alignItems:"stretch" }}>
                        <button onClick={() => addPhrase(phrase)}
                          style={{ padding:"10px 15px", borderRadius: editMode ? "11px 0 0 11px" : 11, border:`1.5px solid ${inA?"rgba(219,39,119,.55)":border}`, borderRight: editMode?"none":undefined, background:inA?"rgba(219,39,119,.18)":"rgba(219,39,119,.05)", color:inA?"#fce7f3":"rgba(240,214,232,.8)", fontSize:13.5, cursor:"pointer", fontFamily:mono, display:"flex", alignItems:"center", gap:5, userSelect:"none" }}
                          onTouchStart={e=>{ if(!inA) e.currentTarget.style.background="rgba(219,39,119,.13)"; }}
                          onTouchEnd={e=>{ e.currentTarget.style.background=inA?"rgba(219,39,119,.18)":"rgba(219,39,119,.05)"; }}
                        >
                          {inA && <span style={{ color:P, fontSize:10 }}>✓</span>}
                          {phrase}
                        </button>
                        {editMode && (
                          <button onClick={() => setEditTarget({ moduleId:curMod.id, catId:curCat.id, idx:origIdx, phrase, moduleName:curMod.label, catName:curCat.label })}
                            style={{ padding:"10px 11px", borderRadius:"0 11px 11px 0", border:`1.5px solid ${border}`, borderLeft:"none", background:"rgba(219,39,119,.09)", color:"rgba(219,39,119,.6)", cursor:"pointer", display:"flex", alignItems:"center" }}>
                            <Edit2/>
                          </button>
                        )}
                      </div>
                    );
                  })}
                  {editMode && curCat && (
                    <button onClick={() => setAddTarget({ moduleId:curMod.id, catId:curCat.id, moduleName:curMod.label, catName:curCat.label })}
                      style={{ padding:"10px 15px", borderRadius:11, border:"1.5px dashed rgba(219,39,119,.32)", background:"rgba(219,39,119,.04)", color:"rgba(219,39,119,.55)", fontSize:13.5, cursor:"pointer", fontFamily:mono, display:"flex", alignItems:"center", gap:7 }}>
                      <Plus/> 新增短语
                    </button>
                  )}
                  {search && filtered.length===0 && (
                    <div style={{ width:"100%", textAlign:"center", color:"rgba(240,214,232,.22)", fontSize:14, padding:"24px 0" }}>
                      没有匹配「{search}」的结果
                    </div>
                  )}
                </div>
              </div>
            )}

            <div style={{
              position:"absolute", bottom:0, left:0, right:0,
              background:"rgba(8,0,6,.93)",
              backdropFilter:"blur(24px)", WebkitBackdropFilter:"blur(24px)",
              borderTop:`1px solid ${border}`,
              padding:`10px 14px env(safe-area-inset-bottom,16px)`,
              display:"flex", gap:10, alignItems:"center",
              flexShrink:0, zIndex:500,
            }}>
              <button onClick={() => setShowPrompt(true)} style={{ flex:1, height:52, borderRadius:14, border:`1.5px solid ${assembled.length?"rgba(219,39,119,.4)":border}`, background:assembled.length?"rgba(219,39,119,.15)":"rgba(219,39,119,.04)", color:assembled.length?"#fce7f3":muted, cursor:"pointer", display:"flex", alignItems:"center", gap:10, padding:"0 16px" }}>
                <span style={{ display:"flex", opacity:.7 }}><Bubble/></span>
                <span style={{ fontSize:14, fontWeight:assembled.length?600:400 }}>
                  {assembled.length ? `已选 ${assembled.length} 条` : "查看 Prompt"}
                </span>
                {assembled.length > 0 && (
                  <span style={{ marginLeft:"auto", minWidth:22, height:22, background:`linear-gradient(135deg,${P},#be185d)`, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, color:"#fff", flexShrink:0 }}>
                    {assembled.length}
                  </span>
                )}
              </button>
              <button onClick={handleCopy} disabled={!assembled.length} style={{ width:52, height:52, borderRadius:14, border:"none", background:assembled.length?`linear-gradient(135deg,${P},#9d174d)`:"rgba(219,39,119,.1)", color:assembled.length?"#fff":"rgba(255,255,255,.2)", cursor:assembled.length?"pointer":"not-allowed", display:"flex", alignItems:"center", justifyContent:"center", boxShadow:assembled.length?"0 4px 18px rgba(219,39,119,.35)":"none", flexShrink:0 }}>
                {copied ? <Check/> : <Copy/>}
              </button>
            </div>
          </div>

          {showPrompt && <PromptSheet assembled={assembled} onRemove={removePhrase} onCopy={handleCopy} onClear={() => { setAssembled([]); flash("已清空"); }} onClose={() => setShowPrompt(false)} copied={copied} />}
          {editTarget  && <EditModal target={editTarget} onSave={saveEdit} onDelete={deleteEdit} onClose={() => setEditTarget(null)} />}
          {addTarget   && <AddModal moduleName={addTarget.moduleName} catName={addTarget.catName} onAdd={addNew} onClose={() => setAddTarget(null)} />}
          <Toast msg={toast.msg} visible={toast.v} />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
